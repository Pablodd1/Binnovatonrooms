# Railway config for BuildScan Detection Service
# Docs: https://docs.railway.com/deploy/config-as-code
#
# Deploy via: railway.com dashboard → New Project → Deploy from GitHub repo
# Select Pablodd1/Binnovatonrooms — Railway will auto-detect this config.

[deploy]
# Root directory of the Python service (repo has multiple apps)
root = "detection-service"

# Dockerfile location relative to root
dockerfilePath = "detection-service/Dockerfile"

# Health check (Railway will ping this to verify service is up)
healthcheckPath = "/health"
healthcheckTimeout = 300

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
