services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - detection
    volumes:
      - .:/app
      - /app/node_modules

  detection:
    build: ./detection-service
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./detection-service/models:/app/models
